<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>تحدي الكلمات المتقاطعة</title>
    <meta
      name="description"
      content="تحدي الكلمات المتقاطعة - ابحث عن الكلمات المخفية في شبكة النيون ونافس أصدقائك في 100 مستوى ممتع."
    />

    <!-- وسوم Meta للنشر على فيسبوك (Open Graph) -->
    <meta property="og:title" content="تحدي الكلمات المتقاطعة" />
    <meta
      property="og:description"
      content="ابحث عن الكلمات المخفية في شبكة النيون! هل يمكنك العثور عليها جميعاً في أسرع وقت؟"
    />
    <!-- تأكد من وضع صورة الغلاف في مجلد assets/images -->
    <meta property="og:image" content="assets/images/og-image.jpg" />
    <!-- ضع رابط صورة لعبتك هنا -->
    <meta property="og:url" content="https://apps.facebook.com/your-game-id" />
    <!-- ضع رابط موقع اللعبة هنا -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="fb:app_id" content="1234567890" />
    <!-- استبدل هذا الرقم بمعرف تطبيقك الحقيقي من فيسبوك -->
    <!-- اختياري: معرف تطبيق فيسبوك -->

    <!-- وسوم Meta لتويتر (Twitter Cards) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="تحدي الكلمات المتقاطعة" />
    <meta
      name="twitter:description"
      content="ابحث عن الكلمات المخفية في شبكة النيون! هل يمكنك العثور عليها جميعاً في أسرع وقت؟"
    />
    <meta name="twitter:image" content="assets/images/og-image.jpg" />

    <!-- روابط PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#00f2fe" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- مكتبة ألعاب فيسبوك الفورية (Instant Games SDK) -->
    <script src="https://connect.facebook.net/en_US/fbinstant.7.1.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* تعريف المتغيرات للوضع الليلي والنهاري */
      :root {
        --bg-gradient: #000;
        --text-color: #fff;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --item-bg: rgba(255, 255, 255, 0.03);
        --shadow-color: rgba(0, 0, 0, 0.6);
        --accent-cyan: #00f2fe;
        --accent-pink: #ff007f;
        --accent-yellow: #ffea00;
      }

      /* تعريف متغيرات الوضع النهاري */
      body.light-mode {
        --bg-gradient: radial-gradient(
          circle at center,
          #f0f2f5 0%,
          #c9d6ff 100%
        );
        --text-color: #1a1a2e;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(0, 0, 0, 0.1);
        --item-bg: rgba(0, 0, 0, 0.05);
        --shadow-color: rgba(0, 0, 0, 0.15);
        --accent-cyan: #0077be;
        --accent-pink: #d81b60;
      }

      /* التبديل للوضع النهاري تلقائياً */
      @media (prefers-color-scheme: light) {
        :root {
          --bg-gradient: radial-gradient(
            circle at center,
            #f0f2f5 0%,
            #c9d6ff 100%
          );
          --text-color: #1a1a2e;
          --glass-bg: rgba(255, 255, 255, 0.7);
          --glass-border: rgba(0, 0, 0, 0.1);
          --item-bg: rgba(0, 0, 0, 0.05);
          --shadow-color: rgba(0, 0, 0, 0.15);
        }
      }

      body {
        font-family: "Tajawal", sans-serif;
        background: var(--bg-gradient);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        margin: 0;
        padding: 10px;
        overflow-x: hidden;
        overflow-y: auto; /* السماح بالتمرير العمودي إذا كان المحتوى أكبر من الشاشة */
      }
      .scoreboard {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        font-size: 1rem;
        animation: fadeInDown 0.8s ease-out;
      }
      .score-item {
        text-align: center;
        background: var(--item-bg);
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 15px var(--shadow-color);
        transition: transform 0.3s ease;
      }
      .score-item:hover {
        transform: translateY(-3px);
      }
      .high-scoreboard {
        margin-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 10px;
      }
      .high-scoreboard .score-item {
        background: rgba(0, 242, 254, 0.1);
        border: 1px solid rgba(0, 242, 254, 0.1);
        color: var(--accent-cyan);
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.15);
      }
      .mode-selector {
        margin-bottom: 20px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        animation: fadeInDown 1s ease-out;
      }
      .mode-option {
        padding: 6px 12px;
        background: var(--item-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.75rem;
      }
      .mode-option.active {
        background: var(--accent-cyan);
        color: #0f0f1a;
        border-color: var(--accent-cyan);
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      }

      /* استعادة التنسيقات المفقودة لإخفاء العناصر غير المستخدمة حالياً */
      .online-controls {
        display: none;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
        background: var(--glass-bg);
        padding: 15px;
        border-radius: 15px;
        border: 1px solid var(--glass-border);
        width: min(350px, 100%);
      }
      .online-controls input {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 8px;
        border-radius: 5px;
        text-align: center;
      }
      .peer-id-display {
        font-size: 0.8rem;
        color: var(--accent-cyan);
      }
      .peer-id-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        margin-top: 5px;
      }
      .mini-btn {
        padding: 4px 10px;
        font-size: 0.7rem;
        background: rgba(0, 242, 254, 0.1);
        border: 1px solid var(--accent-cyan);
        color: var(--accent-cyan);
        border-radius: 5px;
        cursor: pointer;
      }
      .difficulty-selector {
        margin-bottom: 15px;
        display: none;
        gap: 10px;
      }
      .difficulty-option {
        padding: 5px 15px;
        background: var(--item-bg);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: 0.3s;
      }
      .chat-container {
        display: none;
        width: min(350px, 100%);
        margin-top: 15px;
        background: var(--glass-bg);
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        overflow: hidden;
      }
      .chat-history {
        height: 100px;
        overflow-y: auto;
        padding: 10px;
        font-size: 0.85rem;
        text-align: right;
      }

      /* New styles for word list */
      .words-to-find {
        margin-top: 10px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-color);
        animation: fadeInUp 1.2s ease-out;
      }
      .words-to-find p {
        margin-bottom: 10px;
        color: var(--accent-cyan);
        text-shadow: 0 0 8px var(--accent-cyan);
      }
      .words-to-find ul {
        list-style: none;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        max-width: 100%;
      }
      .words-to-find li {
        background: var(--item-bg);
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
        transition:
          background 0.3s ease,
          color 0.3s ease;
        font-weight: bold;
        color: var(--text-color);
      }
      .words-to-find li.found {
        background: var(--accent-pink); /* Pink for found words */
        color: #0f0f1a;
        text-decoration: line-through;
        border-color: var(--accent-pink);
        box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
      }

      h1 {
        font-size: clamp(1.5rem, 7vw, 2.2rem);
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        color: var(--accent-cyan);
        letter-spacing: 1px;
        animation: fadeInDown 0.6s ease-out;
      }

      .game-container {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 15px;
        box-shadow: 0 25px 50px var(--shadow-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 100%;
        animation: fadeInUp 0.8s ease-out;
      }

      .status-box {
        font-size: 1rem;
        margin-bottom: 15px;
        padding: 8px 15px;
        border-radius: 30px;
        background: var(--item-bg);
        border: 1px solid var(--glass-border);
        text-align: center;
        min-width: 250px;
      }
      .status-box span {
        font-weight: bold;
        text-shadow: 0 0 8px currentColor;
      }
      .board {
        display: grid;
        gap: 4px;
        width: 92vw;
        max-width: 450px;
        aspect-ratio: 1 / 1;
        margin: 0 auto;
        animation: zoomIn 0.5s ease-out;
      }
      .cell {
        background: var(--item-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px; /* Adjusted for larger grid */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(0.6rem, 3.2vw, 1.4rem);
        font-weight: bold;
        cursor: pointer;
        transition: all 0.25s ease-in-out;
        user-select: none;
        color: var(--text-color);
      }
      .cell:hover {
        background: var(--glass-border);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      /* Removed .cell.X and .cell.O as it's not XO anymore */
      .cell.selected {
        /* New style for currently selected letters */
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--accent-cyan) 60%, transparent) 0%,
          color-mix(in srgb, var(--accent-cyan) 10%, transparent) 50%,
          color-mix(in srgb, var(--accent-cyan) 40%, transparent) 100%
        );
        border-color: var(--accent-cyan);
        color: var(--text-color);
        text-shadow: 0 0 12px var(--accent-cyan);
        box-shadow:
          inset 0 0 20px color-mix(in srgb, var(--accent-cyan) 50%, transparent),
          0 0 15px color-mix(in srgb, var(--accent-cyan) 30%, transparent);
      }
      .cell.found-word {
        /* Style for letters of a found word */
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--accent-pink) 60%, transparent) 0%,
          color-mix(in srgb, var(--accent-pink) 20%, transparent) 50%,
          color-mix(in srgb, var(--accent-pink) 50%, transparent) 100%
        );
        border-color: var(--accent-pink);
        color: var(--text-color);
        text-shadow: 0 0 12px var(--accent-pink);
        box-shadow:
          inset 0 0 20px color-mix(in srgb, var(--accent-pink) 50%, transparent),
          0 0 15px color-mix(in srgb, var(--accent-pink) 30%, transparent);
        animation: pulseWinning 1s infinite alternate;
      }

      .reset-btn {
        margin-top: 25px;
        padding: 12px 30px;
        font-size: 1.1rem;
        background: transparent;
        color: var(--accent-cyan);
        border: 2px solid var(--accent-cyan);
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px
          color-mix(in srgb, var(--accent-cyan) 20%, transparent);
      }
      .reset-btn:hover {
        background: var(--accent-cyan);
        color: #0f0f1a;
        box-shadow: 0 0 20px
          color-mix(in srgb, var(--accent-cyan) 60%, transparent);
        transform: translateY(-2px);
      }
      @keyframes pulseWinning {
        from {
          transform: scale(1); /* Adjusted for found words */
          box-shadow: 0 0 10px
            color-mix(in srgb, var(--accent-pink) 30%, transparent);
        } /* Adjusted for found words */
        to {
          transform: scale(1.05);
          box-shadow: 0 0 25px
            color-mix(in srgb, var(--accent-pink) 60%, transparent);
        }
      }
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      /* تأثير الاهتزاز عند الخطأ */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
        100% {
          transform: translateX(0);
        }
      }
      .shake {
        animation: shake 0.3s ease-in-out;
      }
      /* تنسيق خلفية الجزيئات */
      #particles-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* خلف جميع العناصر */
        pointer-events: none;
        background: transparent;
      }

      /* تنسيق لوحة المتصدرين (Modal) */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: color-mix(
          in srgb,
          var(--shadow-color) 85%,
          transparent
        );
        backdrop-filter: blur(5px);
      }
      .modal-content {
        background: var(--bg-gradient);
        margin: 10% auto;
        padding: 20px;
        border: 1px solid var(--accent-cyan);
        border-radius: 20px;
        width: min(400px, 90%);
        box-shadow: 0 0 30px
          color-mix(in srgb, var(--accent-cyan) 20%, transparent);
        text-align: center;
      }
      .leaderboard-list {
        list-style: none;
        padding: 0;
        margin-top: 20px;
        max-height: 380px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--accent-cyan) transparent;
      }
      .leaderboard-list::-webkit-scrollbar {
        width: 6px;
      }
      .leaderboard-list::-webkit-scrollbar-thumb {
        background: var(--accent-cyan);
        border-radius: 10px;
      }
      .leaderboard-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid transparent;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        opacity: 0;
        transform: translateX(20px);
      }
      .leaderboard-item.show {
        opacity: 1;
        transform: translateX(0);
      }
      .leaderboard-item:hover {
        background: rgba(0, 242, 254, 0.05);
        border-color: rgba(0, 242, 254, 0.2);
        transform: scale(1.02);
      }
      .leaderboard-item.current-user {
        background: rgba(255, 0, 127, 0.08);
        border: 1px solid var(--accent-pink);
        box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.1);
      }
      .rank-badge {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-weight: bold;
        font-size: 0.85rem;
        background: var(--item-bg);
        color: var(--text-color);
      }
      .rank-1 {
        background: linear-gradient(135deg, #ffd700, #b8860b);
        color: #000;
        box-shadow: 0 0 10px #ffd700;
      }
      .rank-2 {
        background: linear-gradient(135deg, #c0c0c0, #808080);
        color: #000;
      }
      .rank-3 {
        background: linear-gradient(135deg, #cd7f32, #8b4513);
        color: #000;
      }
      .leaderboard-item img {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 2px solid var(--accent-cyan);
        object-fit: cover;
      }
      .close-modal {
        float: left;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--accent-pink);
      }

      /* تصميم شاشة التحميل الاحترافية */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.8s ease;
      }
      .loading-content {
        text-align: center;
        width: 85%;
        max-width: 450px;
      }
      #splash-img {
        width: 100%;
        border-radius: 20px;
        margin-bottom: 25px;
        box-shadow: 0 0 30px var(--accent-cyan);
        border: 2px solid var(--glass-border);
        animation: floatSplash 3s ease-in-out infinite;
      }
      @keyframes floatSplash {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .progress-container {
        width: 100%;
        height: 12px;
        background: var(--item-bg);
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent-cyan),
          var(--accent-pink)
        );
        box-shadow: 0 0 15px var(--accent-cyan);
        transition: width 0.4s ease;
      }
      #loading-text {
        margin-top: 15px;
        font-size: 1rem;
        color: var(--accent-cyan);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- شاشة التحميل -->
    <div id="loading-screen">
      <div class="loading-content">
        <img
          src="assets/images/splash.webp"
          alt="Splash Screen"
          loading="eager"
          width="450"
          height="253"
          id="splash-img"
          onerror="
            this.style.display = 'none';
            console.error(
              'فشل تحميل صورة Splash. تأكد من المسار: assets/images/splash.webp',
            );
          "
        />
        <div class="progress-container">
          <div id="progress-bar"></div>
        </div>
        <p id="loading-text">جاري تحضير عالم النيون... 0%</p>
      </div>
    </div>

    <div class="header-container">
      <h1 id="gameTitle">تحدي الكلمات المتقاطعة</h1>
    </div>

    <div class="mode-selector">
      <div class="mode-option active" id="modePVP">ابدأ اللعب</div>
      <div
        class="mode-option"
        id="themeToggleBtn"
        style="border-color: var(--accent-cyan); color: var(--accent-cyan)"
      >
        وضع نهاري ☀️
      </div>
      <div
        class="mode-option"
        id="hintBtn"
        style="border-color: var(--accent-yellow); color: var(--accent-yellow)"
      >
        تلميحة 💡
      </div>
      <div
        class="mode-option"
        id="showLeaderboardBtn"
        style="border-color: var(--accent-cyan); color: var(--accent-cyan)"
      >
        الأوائل 🏆
      </div>
      <div
        class="mode-option"
        id="shareFB"
        style="background: #1877f2; color: white"
      >
        نشر النتيجة 🔵
      </div>
      <div
        class="mode-option"
        id="inviteBtn"
        style="background: #25d366; color: white; border-color: #25d366"
      >
        تحدي صديق ✉️
      </div>
      <div
        class="mode-option"
        id="installBtn"
        style="
          display: none;
          border-color: var(--accent-cyan);
          color: var(--accent-cyan);
        "
      >
        تثبيت اللعبة 📱
      </div>
    </div>

    <div
      id="levelIndicator"
      style="
        margin-bottom: 10px;
        color: var(--accent-cyan);
        font-weight: bold;
        font-size: 1.3rem;
      "
    >
      المستوى: <span id="currentLevelNum">1</span> / 100
    </div>

    <div
      id="intersectionsIndicator"
      style="
        margin-bottom: 10px;
        color: var(--accent-yellow);
        font-weight: bold;
        font-size: 1.1rem;
      "

      const loadingText = document.getElementById("loading-text");

      const updateProgress = (p) => {
        if (typeof FBInstant !== "undefined" && FBInstant.setLoadingProgress) {
          FBInstant.setLoadingProgress(p);
        }
        if (progressBar) progressBar.style.width = p + "%";
        if (loadingText)
          loadingText.textContent = `جاري تحضير عالم النيون... ${Math.floor(p)}%`;
      };

      const loadingInterval = setInterval(() => {
        loadingProgress += Math.random() * 8;
        if (loadingProgress >= 95) {
          loadingProgress = 95;
          clearInterval(loadingInterval);
        }
        updateProgress(loadingProgress);
      }, 150);

        // الصعوبة تزداد تدريجياً - تم تحسين حجم الشبكة لضمان نجاح توزيع الكلمات
        let size = 6 + Math.floor(i / 20); // تبدأ من 6x6 وتصل إلى 11x11
        let wordCount = 3 + Math.floor(i / 15); // من 3 إلى 9

        // تحسين: اختيار كلمات تناسب حجم الشبكة فقط
        let possibleWords = fullWordBank.filter((w) => w.length <= size);
        let shuffled = possibleWords.sort(() => 0.5 - Math.random());

        levels.push({
          name: "مستوى " + i,
          words: shuffled.slice(0, Math.min(wordCount, size + 2)),
          gridSize: Math.min(size, 10),
          maxAttempts: 100 + i,
        });

      if (challengeLevel !== null && !isNaN(challengeLevel)) {
        currentLevelIndex = parseInt(challengeLevel);
      } else {

          parseInt(localStorage.getItem("currentWordLevel")) || 0;
      }

      if (currentLevelIndex >= levels.length) currentLevelIndex = 0; // حماية من تجاوز عدد المستويات

      function startTimer() {
        if (timerInterval) return;
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
          elapsedTime = Date.now() - startTime;
          updateTimerDisplay();
        }, 1000);
      }

      function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      function resetTimer() {
        stopTimer();
        elapsedTime = 0;
        updateTimerDisplay();
      }

      function updateTimerDisplay() {
        const totalSeconds = Math.floor(elapsedTime / 1000);
        const minutes = Math.floor(totalSeconds / 60)
          .toString()
          .padStart(2, "0");
        const seconds = (totalSeconds % 60).toString().padStart(2, "0");
        document.getElementById("timerDisplay").textContent =
          `الوقت: ${minutes}:${seconds}`;
      }

        ];
        // إضافة الاتجاهات المائلة من المستوى الثالث فما فوق لزيادة التحدي
        if (currentLevelIndex >= 2) {
          directions.push({ dr: 1, dc: 1 });
          directions.push({ dr: 1, dc: -1 });
        }

        for (let attempt = 0; attempt < currentLevel.maxAttempts; attempt++) {
          const dir = directions[Math.floor(Math.random() * directions.length)];
          const startRow = Math.floor(Math.random() * size);
          const startCol = Math.floor(Math.random() * size);

          let canPlace = true;
          let path = [];

          for (let i = 0; i < word.length; i++) {
            const r = startRow + i * dir.dr;
            const c = startCol + i * dir.dc;

            if (r >= size || c >= size || r < 0 || c < 0) {
              canPlace = false;
              break;
            }

            const index = r * size + c;
            // يسمح بوضع الحرف إذا كانت الخلية فارغة أو إذا كان الحرف الموجود مطابقاً للحرف الحالي
            if (currentGrid[index] !== "" && currentGrid[index] !== word[i]) {
              canPlace = false;
              break;
            }
            path.push(index);
          }

          if (canPlace) {
            for (let i = 0; i < word.length; i++) {
              currentGrid[path[i]] = word[i];
            }
            return path; // Return the indices where the word was placed
          }
        }
        return null; // Could not place word
      }

      function initBoard() {
        resetTimer();
        foundWords = [];
        intersectionsCount = 0;
        document.getElementById("intersectionsCount").textContent =
          intersectionsCount;
        currentSelection = "";
        currentPath = [];
        currentLevel = levels[currentLevelIndex]; // تحديث المستوى الحالي

        // تمييز ما إذا كان هذا المستوى هو تحدي
        if (urlParams.has("challengeLevel")) {
          statusBox.innerHTML = `<span id="currentSelectionDisplay" style="color:#ffea00">لقد قبلت التحدي! المستوى ${currentLevelIndex + 1}</span>`;
        } else {
          statusBox.innerHTML =
            '<span id="currentSelectionDisplay">ابدأ باختيار الحروف</span>';
        }

        currentSelectionDisplay = document.getElementById(
          "currentSelectionDisplay",
        ); // تحديث المرجع
        document.getElementById("currentLevelNum").textContent =
          currentLevelIndex + 1;
        currentLevel = levels[currentLevelIndex];
        hintBtn.style.opacity = "1";

        // Initialize empty grid
        grid = Array(currentLevel.gridSize * currentLevel.gridSize).fill("");
        window.placedWordPaths = {}; // To store paths for hints
        targetWords = []; // Reset targetWords for the new level

        // Place target words
        for (let word of currentLevel.words) {
          // Iterate through the original words for the level
          const path = placeWord(word, grid, currentLevel.gridSize);
          if (path) {
            window.placedWordPaths[word] = path;
            targetWords.push(word); // Only add to targetWords if successfully placed
          } else {
            console.warn(
              `Could not place word: "${word}" in grid size ${currentLevel.gridSize}. This word will not be part of the current level.`,
            );
          }
        }

        // Safeguard: If no words were placed at all (e.g., all original words were too long or couldn't fit),
        // try to place at least one short word to make the level playable.
        if (targetWords.length === 0) {
          const shortFallbackWord = fullWordBank.find(
            (w) => w.length <= currentLevel.gridSize && w.length > 0,
          );
          if (shortFallbackWord) {
            const path = placeWord(
              shortFallbackWord,
              grid,
              currentLevel.gridSize,
            );
            if (path) {
              window.placedWordPaths[shortFallbackWord] = path;
              targetWords.push(shortFallbackWord);
              console.warn(
                `No original words could be placed. Added fallback word: "${shortFallbackWord}" to make the level playable.`,
              );
            } else {
              console.error(
                "Could not place any word, even a short fallback. Level might be unplayable.",
              );
            }
          }
        }

        // Fill remaining empty cells with random letters
        for (let i = 0; i < grid.length; i++) {
          if (grid[i] === "") {
            grid[i] = getRandomLetter();
          }
        }

        // Render the board
        boardElement.innerHTML = "";
        boardElement.style.gridTemplateColumns = `repeat(${currentLevel.gridSize}, 1fr)`;

        grid.forEach((letter, index) => {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = letter;
          cell.setAttribute("data-index", index);
          cell.addEventListener("click", () => handleLetterClick(cell, index));
          // تحسين اللمس للموبايل
          cell.addEventListener(
            "touchstart",
            (e) => {
              e.preventDefault();
              handleLetterClick(cell, index);
            },
            { passive: false },
          );

          boardElement.appendChild(cell);
        });

        // Render word list
        wordListElement.innerHTML = "";
        targetWords.forEach((word) => {
          const li = document.createElement("li");
          li.textContent = word;
          li.setAttribute("data-word", word);
          wordListElement.appendChild(li);
        });
      }

      function handleLetterClick(cell, index) {
        if (!isGameActive) return; // Prevent clicking if game not active

        // If this cell is already part of a found word, ignore click
        if (cell.classList.contains("found-word")) return;

        // Check if the clicked cell is adjacent to the last selected cell (optional, but makes it more crossword-like)
        // For simplicity, we'll allow non-adjacent clicks for now, but clear selection if not contiguous.
        if (currentPath.length > 0) {
          const lastIndex = currentPath[currentPath.length - 1];
          const gridSize = currentLevel.gridSize;
          const lastRow = Math.floor(lastIndex / gridSize);
          const lastCol = lastIndex % gridSize;
          const newRow = Math.floor(index / gridSize);
          const newCol = index % gridSize;

          const dr = Math.abs(newRow - lastRow);
          const dc = Math.abs(newCol - lastCol);

          // إذا تم النقر على خلية محددة مسبقاً، نقوم بإلغاء التحديد
          if (currentPath.includes(index)) {
            const pathIndex = currentPath.indexOf(index);
            if (pathIndex === currentPath.length - 1) {
              currentSelection = currentSelection.slice(0, -1);
              currentPath.pop();
              cell.classList.remove("selected");
            } else {
              for (let i = currentPath.length - 1; i > pathIndex; i--) {
                boardElement.children[currentPath[i]].classList.remove(
                  "selected",
                );
              }
              currentPath = currentPath.slice(0, pathIndex + 1);
              currentSelection = currentSelection.slice(0, pathIndex + 1);
            }
            if (currentSelectionDisplay)
              currentSelectionDisplay.textContent =
                currentSelection || "ابدأ باختيار الحروف";
            return;
          }

          // ميزة المغناطيس: التحقق مما إذا كان النقر في خط مستقيم (أفقي، رأسي، أو مائل بزاوية 45)
          const isStraightLine =
            lastRow === newRow || lastCol === newCol || dr === dc;

          if (isStraightLine) {
            const stepR = Math.sign(newRow - lastRow);
            const stepC = Math.sign(newCol - lastCol);

            let currR = lastRow;
            let currC = lastCol;

            // جذب وتحديد الحروف في المسار
            while (currR !== newRow || currC !== newCol) {
              currR += stepR;
              currC += stepC;
              const currIdx = currR * gridSize + currC;

              if (currIdx < 0 || currIdx >= boardElement.children.length) break;

              const currCell = boardElement.children[currIdx];

              if (
                !currentPath.includes(currIdx) &&
                !currCell.classList.contains("found-word")
              ) {
                currentSelection += currCell.textContent;
                currentPath.push(currIdx);
                currCell.classList.add("selected");
                clickSound.currentTime = 0;
                clickSound.play().catch(() => {});
              }
            }
          } else {
            // إذا لم يكن في خط مستقيم، نبدأ تحديداً جديداً من الخلية الحالية
            triggerShake();
            clearCurrentSelection();
            // سيستمر الكود بالأسفل لإضافة الخلية الحالية كبداية جديدة
          }
        }

        // نتحقق مما إذا كانت الخلية قد أضيفت بالفعل (بواسطة ميزة المغناطيس مثلاً) لتجنب التكرار
        if (!currentPath.includes(index)) {
          // Start timer on first valid selection
          if (currentSelection === "" && currentPath.length === 0) {
            startTimer();
          }

          currentSelection += cell.textContent;
          currentPath.push(index);
          cell.classList.add("selected");
          clickSound.currentTime = 0; // إعادة ضبط الصوت لضمان العمل مع النقر السريع
          clickSound.play().catch(() => {});
        }

        if (currentSelectionDisplay)
          currentSelectionDisplay.textContent =
            currentSelection || "ابدأ باختيار الحروف";

        const foundWordIndex = targetWords.findIndex(
          (word) => word === currentSelection,
        );

        if (foundWordIndex !== -1) {
          const foundWord = targetWords[foundWordIndex];

          // التحقق مما إذا كانت الكلمة تتقاطع مع كلمات مكتشفة سابقاً
          const isIntersecting = currentPath.some((idx) =>
            boardElement.children[idx].classList.contains("found-word"),
          );

          foundWords.push(foundWord);
          targetWords.splice(foundWordIndex, 1); // إزالة الكلمة من القائمة المطلوبة

          // Highlight the found word cells
          currentPath.forEach((idx) => {
            boardElement.children[idx].classList.remove("selected");
            boardElement.children[idx].classList.add("found-word");
          });

          // Mark word in the list
          document
            .querySelector(`li[data-word="${foundWord}"]`)
            .classList.add("found");

          confetti({ particleCount: 100, spread: 70 });
          if (isIntersecting) {
            intersectionsCount++;
            document.getElementById("intersectionsCount").textContent =
              intersectionsCount;
            intersectSound.currentTime = 0;
            intersectSound.play().catch(() => {});
          } else {
            winSound.currentTime = 0; // إعادة ضبط صوت الفوز
            winSound.play().catch(() => {});
          }

          const encouragingMessages = [
            "رائع!",
            "أحسنت!",
            "مذهل!",
            "عمل جيد!",
            "استمر!",
            "عبقري!",
            "بطل!",
          ];
          const randomMsg =
            encouragingMessages[
              Math.floor(Math.random() * encouragingMessages.length)
            ];

          clearCurrentSelection();

          if (targetWords.length > 0) {
            statusBox.innerHTML = `<span id="currentSelectionDisplay" style="color: #ffea00">${randomMsg} وجدت كلمة: ${foundWord}</span>`;
            currentSelectionDisplay = document.getElementById(
              "currentSelectionDisplay",
            );
          }

          if (targetWords.length === 0) {
            stopTimer();
            const finalTime =
              document.getElementById("timerDisplay").textContent;

            // منطق فتح المستوى الجديد
            let nextBtnHtml = "";
            if (currentLevelIndex < 99) {
              nextBtnHtml = `<br><button onclick="goToNextLevel()" class="mini-btn" style="margin-top:10px; padding:10px 20px; font-size:1rem;">المستوى التالي ➔</button>`;
              if (
                currentLevelIndex + 1 >
                (parseInt(localStorage.getItem("maxLevelReached")) || 0)
              ) {
                localStorage.setItem("maxLevelReached", currentLevelIndex + 1);
              }
            } else {
              nextBtnHtml = "<br>لقد ختمت جميع المستويات! 🎉";
            }

            statusBox.innerHTML = `<span>🎉 مبروك! حللت المستوى في ${finalTime}${nextBtnHtml}</span>`;
            isGameActive = false;

            // إرسال النتيجة إلى فيسبوك
            submitScoreToFB(elapsedTime);
          }
        } else if (currentSelection.length > currentLevel.gridSize * 2) {
          triggerShake();
          statusBox.innerHTML = "❌ اختيار طويل جداً، حاول مرة أخرى";
          setTimeout(clearCurrentSelection, 1000);
        } else {
          const isPossible = targetWords.some((word) =>
            word.startsWith(currentSelection),
          );
          if (!isPossible) {
            triggerShake();
            setTimeout(clearCurrentSelection, 200);
          }
        }
      }

      // دالة الانتقال للمستوى التالي
      window.goToNextLevel = function () {
        currentLevelIndex++;
        localStorage.setItem("currentWordLevel", currentLevelIndex);
        isGameActive = true;
        initBoard();
      };

      function clearCurrentSelection() {
        currentSelection = "";
        currentPath.forEach((idx) => {
          boardElement.children[idx].classList.remove("selected");
        });
        currentPath = [];
        const display = currentSelectionDisplay;
        if (display) display.textContent = "ابدأ باختيار الحروف";
      }

      // وظيفة التلميحة
      function giveHint() {
        if (!isGameActive || targetWords.length === 0) return;
        const randomWord =
          targetWords[Math.floor(Math.random() * targetWords.length)];
        const firstCellIndex = window.placedWordPaths[randomWord][0];
        const cell = boardElement.children[firstCellIndex];

        cell.style.background = "#ffea00";
        cell.style.color = "#000";
        setTimeout(() => {
          cell.style.background = "";
          cell.style.color = "";
        }, 1000);
      }

      hintBtn.addEventListener("click", showAdForHint);

      // وظائف لوحة المتصدرين عبر فيسبوك
      function submitScoreToFB(timeInMs) {
        if (typeof FBInstant === "undefined" || !fbGameStarted) return;

        FBInstant.getLeaderboardAsync("Global_Word_Challenge")
          .then((leaderboard) => {
            // النتيجة هنا هي الوقت، وبما أن الأقل هو الأفضل نضرب في -1 أو نضبط إعدادات اللوحة في فيسبوك
            return leaderboard.setScoreAsync(
              timeInMs,
              JSON.stringify({ level: currentLevelIndex + 1 }),
            );
          })
          .then(() => console.log("Score saved to FB"))
          .catch((err) => console.error("Leaderboard error:", err));
      }

      function showLeaderboard() {

            ? "<li>يرجى الانتظار حتى تحميل اللعبة بالكامل...</li>"

                  </div>
                  <div style="text-align:right;">
                  <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                      <div style="color:var(--accent-pink); font-weight:bold; font-size:0.9rem;">${time} ثانية</div>
                      ${!isMe ? `<button class="mini-btn challenge-player-btn" style="padding: 2px 8px; font-size: 0.65rem;">تحدي ⚔️</button>` : ""}

              const challengeBtn = li.querySelector(".challenge-player-btn");

                    payload: { challengeLevel: currentLevelIndex },
                  });
                });
              }

              // تأثير الدخول المتدرج (Staggered Animation)
              setTimeout(() => {
                li.classList.add("show");
                // تشغيل أصوات المراكز الأولى عند ظهورها
                if (rank === 1)
                  document
                    .getElementById("goldSFX")
                    .play()
                    .catch(() => {});
                else if (rank === 2)
                  document
                    .getElementById("silverSFX")
                    .play()
                    .catch(() => {});
                else if (rank === 3)
                  document
                    .getElementById("bronzeSFX")
                    .play()
                    .catch(() => {});
              }, index * 120);
            });
          })
          .catch((err) => {
            console.error(err);
            entriesContainer.innerHTML =
              "<li>فشل جلب البيانات. تأكد من إعداد لوحة الصدارة في فيسبوك.</li>";

      document
        .getElementById("showLeaderboardBtn")
        .addEventListener("click", showLeaderboard);

        .getElementById("closeLeaderboard")
        .addEventListener("click", () => {
          document.getElementById("leaderboardModal").style.display = "none";
        });
      window.onclick = function (event) {
        if (event.target == document.getElementById("leaderboardModal")) {
          document.getElementById("leaderboardModal").style.display = "none";
        }
      };

      // Event listener for the "Start Game" button
      document.getElementById("modePVP").addEventListener("click", () => {
        isGameActive = true;
        initBoard();
        document.getElementById("modePVP").textContent = "إعادة اللعب"; // Change button text
        document.getElementById("modePVP").classList.remove("active"); // Remove active state
        if (document.getElementById("currentSelectionDisplay")) {
          document.getElementById("currentSelectionDisplay").textContent =
            "ابدأ باختيار الحروف";
        }
      });

      // Initial setup
      initBoard(); // Initialize board on load, but game is inactive
      loadHighScores(); // تحميل الأرقام القياسية عند البدء
      isGameActive = false; // Ensure game is inactive until "Start" is clicked

      resetBtn.addEventListener("click", () => {
        isGameActive = true;
        initBoard();
        document.getElementById("modePVP").textContent = "ابدأ اللعب"; // Reset button text
        document.getElementById("modePVP").classList.add("active"); // Add active state
      });

      document.getElementById("shareFB").addEventListener("click", () => {
        if (!isGameActive && targetWords.length === 0) {
          const finalTime = document.getElementById("timerDisplay").textContent;
          const url = encodeURIComponent(window.location.href);

            `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`,

          alert("أكمل اللعبة أولاً لمشاركة نتيجتك!");

      // منطق زر تحدي صديق
      document.getElementById("inviteBtn").addEventListener("click", () => {
        const level = currentLevelIndex + 1;
        const shareUrl =
          window.location.origin +
          window.location.pathname +

          currentLevelIndex;
        const shareText = `أتحدّاك في لعبة "تحدي الكلمات النيون"! هل يمكنك حل المستوى ${level} في وقت أسرع مني؟ 🏆`;

        // إذا كان المستخدم داخل بيئة فيسبوك

        // إذا كان المتصفح يدعم مشاركة الروابط (واتساب، تليجرام، إلخ)
        else if (navigator.share) {
          navigator
            .share({
              title: "تحدي الكلمات",
              text: shareText,
              url: shareUrl,

            .catch(console.error);
        }
        // الخيار البديل: نسخ الرابط للحافظة
        else {
          navigator.clipboard.writeText(`${shareText} ${shareUrl}`);
          alert(
            "تم نسخ رابط التحدي! أرسله لصديقك عبر واتساب أو أي وسيلة أخرى.",
          );

      });

      // منطق زر تثبيت التطبيق (PWA) المخصص
      let deferredPrompt;
      const installBtn = document.getElementById("installBtn");

      window.addEventListener("beforeinstallprompt", (e) => {
        // منع المتصفح من إظهار النافذة التلقائية
        e.preventDefault();
        // تخزين الحدث ليتم استخدامه لاحقاً
        deferredPrompt = e;
        // إظهار الزر المخصص
        installBtn.style.display = "block";

        installBtn.addEventListener("click", () => {
          // إخفاء الزر بعد النقر
          installBtn.style.display = "none";
          // إظهار نافذة التثبيت الأصلية
          deferredPrompt.prompt();
          // فحص قرار المستخدم
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === "accepted") {
              console.log("User accepted the install prompt");
            }
            deferredPrompt = null;
          });
        });
      });

      window.addEventListener("appinstalled", () => {
        console.log("PWA was installed");
        installBtn.style.display = "none";
      });

      // تسجيل Service Worker للعمل بدون إنترنت
      if ("serviceWorker" in navigator) {
        if (window.location.protocol === "file:") {
          console.warn(
            "تنبيه: Service Worker لا يعمل عبر بروتوكول file://. يرجى استخدام خادم محلي (Local Server).",
          );
        } else {
          window.addEventListener("load", () => {
            navigator.serviceWorker
              .register("./sw.js")
              .then((reg) => console.log("Service Worker Registered"))
              .catch((err) => console.log("Service Worker Failed", err));
          });
        }
      }

      // نظام الجزيئات المتحركة (Animated Particles)
      const pCanvas = document.createElement("canvas");
      pCanvas.id = "particles-canvas";
      document.body.prepend(pCanvas);
      const pCtx = pCanvas.getContext("2d");
      let pArray = [];
      let cyanColor, pinkColor;

      // دالة لتحديث الألوان بناءً على الثيم الحالي (ليلي/نهاري)
      function updateColors() {
        const style = getComputedStyle(document.body);
        cyanColor = style.getPropertyValue("--accent-cyan").trim() || "#00f2fe";
        const rootStyle = getComputedStyle(document.documentElement);
        if (!cyanColor)
          cyanColor = rootStyle.getPropertyValue("--accent-cyan").trim();
        pinkColor = style.getPropertyValue("--accent-pink").trim();
      }

      function pInit() {
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
        pArray = [];
        const count = Math.floor(window.innerWidth / 25);
        for (let i = 0; i < count; i++) {
          pArray.push({
            x: Math.random() * pCanvas.width,
            y: Math.random() * pCanvas.height,
            size: Math.random() * 2 + 0.5,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            type: Math.random() > 0.5 ? "cyan" : "pink",
          });
        }
      }
      function pAnimate() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        pArray.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > pCanvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > pCanvas.height) p.vy *= -1;
          pCtx.fillStyle = p.type === "cyan" ? cyanColor : pinkColor;
          pCtx.globalAlpha = 0.4;
          pCtx.beginPath();
          pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          pCtx.fill();
        });
        requestAnimationFrame(pAnimate);
      }
      window.addEventListener("resize", pInit);
      // مستمع لتغيير وضع النظام تلقائياً
      window
        .matchMedia("(prefers-color-scheme: light)")
        .addEventListener("change", updateColors);

      const themeToggleBtn = document.getElementById("themeToggleBtn");
      // التحقق من الثيم المخزن عند تحميل الصفحة
      if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-mode");
        themeToggleBtn.textContent = "وضع ليلي 🌙";
      }

      themeToggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("light-mode");
        const isLight = document.body.classList.contains("light-mode");
        themeToggleBtn.textContent = isLight ? "وضع ليلي 🌙" : "وضع نهاري ☀️";
        localStorage.setItem("theme", isLight ? "light" : "dark");

        // تحديث ألوان الجزيئات المتحركة لتناسب الوضع الجديد
        updateColors();
        pInit();
      });

      updateColors();
      pInit();
      pAnimate();

      // دالة تأثير الكتابة المتحرك
      function startTypingEffect() {
        const titleEl = document.getElementById("gameTitle");
        const text = titleEl.innerText;
        titleEl.innerText = "";
        titleEl.classList.add("typing-cursor");

        let i = 0;
        function type() {
          if (i < text.length) {
            titleEl.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 300); // تقليل سرعة الكتابة (زيادة الوقت بين الحروف)
          } else {
            setTimeout(() => titleEl.classList.remove("typing-cursor"), 2000);
          }
        }
        type();
      }
      startTypingEffect();
      //]]>
    </script>
  </body>
</html>
